<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streamline — Download</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f0f0f',
            surface: '#1a1a1a',
            'surface-2': '#222222',
            border: '#2a2a2a',
            accent: '#ff4444',
            'accent-hover': '#ff6666',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-[#e0e0e0] font-sans">

  <nav class="sticky top-0 z-50 h-14 bg-surface border-b border-border flex items-center px-6 gap-4">
    <a href="/index.html" class="text-xl font-bold text-accent tracking-tight shrink-0">Streamline</a>
    <div class="flex items-center gap-1">
      <a href="/index.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Download</a>
      <a href="/queue.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Queue <span id="queue-badge" class="hidden inline-flex items-center justify-center min-w-[18px] h-[18px] px-1.5 rounded-full bg-accent text-white text-[10px] font-bold">0</span></a>
      <a href="/history.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">History</a>
      <a href="/library.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Library</a>
      <a href="/settings.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Settings</a>
    </div>
    <div class="flex-1"></div>
    <button class="bg-transparent text-[#888] hover:text-[#e0e0e0] border-0 px-3 py-1.5 text-sm cursor-pointer transition" onclick="logout()">Logout</button>
  </nav>

  <main class="max-w-[860px] mx-auto p-6">

    <!-- Presets -->
    <div class="bg-surface border border-border rounded-lg p-6 mt-4" id="presets-card">
      <div class="flex items-center justify-between gap-4">
        <div class="flex-1">
          <label for="preset-select" class="block text-sm text-[#888] font-medium mb-1">Preset</label>
          <select id="preset-select" onchange="applyPreset()"
            class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition">
            <option value="">-- Custom --</option>
          </select>
        </div>
        <button class="bg-surface-2 text-[#e0e0e0] border border-border hover:border-[#888] px-4 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition mt-[1.25rem]" onclick="savePreset()">Save as Preset</button>
      </div>
    </div>

    <div class="bg-surface border border-border rounded-lg p-6 mt-4">
      <!-- URL input -->
      <div class="mb-4">
        <label for="url-input" class="block text-sm text-[#888] font-medium mb-1">Video or Playlist URL</label>
        <input type="url" id="url-input" placeholder="https://youtube.com/watch?v=..." autocomplete="off"
          class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition placeholder:text-[#888]">
      </div>

      <!-- Format / Quality / Options row -->
      <div class="grid grid-cols-2 md:grid-cols-[1fr_1fr_auto] gap-3 items-end">
        <div>
          <label for="fmt-select" class="block text-sm text-[#888] font-medium mb-1">Format</label>
          <select id="fmt-select"
            class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition">
            <option value="mp4">MP4 (video)</option>
            <option value="webm">WebM (video)</option>
            <option value="mkv">MKV (video)</option>
            <option value="mp3">MP3 (audio)</option>
            <option value="m4a">M4A (audio)</option>
            <option value="best">Best (auto)</option>
          </select>
        </div>
        <div>
          <label for="qual-select" class="block text-sm text-[#888] font-medium mb-1">Quality</label>
          <select id="qual-select"
            class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition">
            <option value="best">Best</option>
            <option value="4k">4K</option>
            <option value="1440p">1440p</option>
            <option value="1080p">1080p</option>
            <option value="720p">720p</option>
            <option value="480p">480p</option>
            <option value="audio">Audio only</option>
          </select>
        </div>
        <button id="preview-btn" class="bg-surface-2 text-[#e0e0e0] border border-border hover:border-[#888] px-4 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition" onclick="fetchInfo()">Preview</button>
      </div>

      <label class="flex items-center gap-2.5 my-3 text-sm text-[#888] cursor-pointer">
        <input type="checkbox" id="playlist-toggle" class="accent-accent w-4 h-4 cursor-pointer">
        Download as playlist
      </label>


      <!-- Advanced Options -->
      <details class="mt-4 mb-4">
        <summary class="cursor-pointer text-accent text-sm font-semibold">Advanced Options</summary>
        <div class="flex flex-wrap gap-4 mt-4">
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" id="embed-subs" class="accent-accent w-4 h-4 cursor-pointer"> Embed Subtitles
          </label>
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" id="embed-thumb" class="accent-accent w-4 h-4 cursor-pointer"> Embed Thumbnail
          </label>
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" id="embed-meta" class="accent-accent w-4 h-4 cursor-pointer"> Embed Metadata
          </label>
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" id="split-chapters" class="accent-accent w-4 h-4 cursor-pointer"> Split Chapters
          </label>
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" id="write-info" class="accent-accent w-4 h-4 cursor-pointer"> Save Info JSON
          </label>
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" id="remux" class="accent-accent w-4 h-4 cursor-pointer"> Remux output
          </label>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
          <div>
            <label for="subs-langs" class="block text-sm text-[#888] font-medium mb-1">Subtitle Languages (comma separated, e.g., en,fr)</label>
            <input type="text" id="subs-langs" placeholder="en"
              class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition placeholder:text-[#888]">
          </div>
          <div>
            <label for="sponsorblock" class="block text-sm text-[#888] font-medium mb-1">SponsorBlock</label>
            <select id="sponsorblock"
              class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition">
              <option value="">Disabled</option>
              <option value="mark">Mark Sponsors</option>
              <option value="remove">Remove Sponsors</option>
            </select>
          </div>
        </div>
      </details>

      <!-- Info preview -->
      <div id="info-card" class="hidden items-start gap-4 bg-surface border border-border rounded-lg p-6 mt-4">
        <img id="info-thumb" class="w-[120px] min-w-[120px] aspect-video object-cover rounded-md bg-surface-2" src="" alt="">
        <div>
          <h3 id="info-title" class="text-base font-medium mb-1"></h3>
          <p id="info-uploader" class="text-sm text-[#888] mb-0.5"></p>
          <p id="info-duration" class="text-sm text-[#888]"></p>
        </div>
      </div>

      <p id="url-error" class="text-[#ef4444] text-sm mt-2 hidden"></p>

      <div class="flex items-center gap-3 mt-4">
        <button id="download-btn" class="bg-accent hover:bg-accent-hover text-white font-medium px-5 py-2.5 rounded-lg cursor-pointer transition" onclick="submitDownload()">
          Download
        </button>
        <span id="submit-msg" class="text-[#888] text-sm hidden"></span>
      </div>
    </div>
  </main>

  <script src="./assets/app.js"></script>
  <script>
    let _presets = [];

    document.addEventListener('DOMContentLoaded', () => {
      setupNav();
      autoPasteUrl('url-input');
      syncQualityOptions();
      loadPresets();
    });

    document.getElementById('fmt-select').addEventListener('change', syncQualityOptions);

    function syncQualityOptions() {
      const fmt = document.getElementById('fmt-select').value;
      const qual = document.getElementById('qual-select');
      const isAudio = fmt === 'mp3' || fmt === 'm4a';
      [...qual.options].forEach(o => {
        const audioOnly = o.value === 'audio';
        const videoOnly = ['4k','1440p','1080p','720p','480p'].includes(o.value);
        o.hidden = isAudio ? videoOnly : audioOnly;
      });
      if (isAudio) qual.value = 'audio';
      else if (qual.value === 'audio') qual.value = 'best';
    }

    async function loadPresets() {
      try {
        _presets = await api('/presets');
        const sel = document.getElementById('preset-select');
        sel.innerHTML = '<option value="">-- Custom --</option>';
        _presets.forEach(p => {
          sel.innerHTML += `<option value="${p.id}">${escHtml(p.name)}</option>`;
        });
      } catch (e) {
        console.error("Failed to load presets", e);
      }
    }

    function applyPreset() {
      const id = document.getElementById('preset-select').value;
      if (!id) return;
      const p = _presets.find(x => x.id == id);
      if (!p || !p.options) return;
      const o = p.options;
      
      document.getElementById('fmt-select').value = o.format || 'mp4';
      syncQualityOptions();
      document.getElementById('qual-select').value = o.quality || 'best';
      if(document.getElementById('playlist-toggle')) document.getElementById('playlist-toggle').checked = !!o.playlist;
      
      if(document.getElementById('embed-subs')) document.getElementById('embed-subs').checked = !!o.embed_subs;
      if(document.getElementById('embed-thumb')) document.getElementById('embed-thumb').checked = !!o.embed_thumbnail;
      if(document.getElementById('embed-meta')) document.getElementById('embed-meta').checked = !!o.embed_metadata;
      if(document.getElementById('split-chapters')) document.getElementById('split-chapters').checked = !!o.split_chapters;
      if(document.getElementById('write-info')) document.getElementById('write-info').checked = !!o.write_info_json;
      if(document.getElementById('remux')) document.getElementById('remux').checked = !!o.remux;
      if(document.getElementById('subs-langs')) document.getElementById('subs-langs').value = (o.subtitles_langs || []).join(',');
      if(document.getElementById('sponsorblock')) document.getElementById('sponsorblock').value = o.sponsorblock || '';
    }

    function getOptions() {
      const format = document.getElementById('fmt-select')?.value || 'mp4';
      const quality = document.getElementById('qual-select')?.value || 'best';
      const playlist = document.getElementById('playlist-toggle')?.checked || false;
      const embed_subs = document.getElementById('embed-subs')?.checked || false;
      const embed_thumbnail = document.getElementById('embed-thumb')?.checked || false;
      const embed_metadata = document.getElementById('embed-meta')?.checked || false;
      const split_chapters = document.getElementById('split-chapters')?.checked || false;
      const write_info_json = document.getElementById('write-info')?.checked || false;
      const remux = document.getElementById('remux')?.checked || false;
      
      const subs_langs_el = document.getElementById('subs-langs');
      const subs_langs_str = subs_langs_el ? subs_langs_el.value.trim() : '';
      const subtitles_langs = subs_langs_str ? subs_langs_str.split(',').map(s => s.trim()) : null;
      
      const sponsorblock_el = document.getElementById('sponsorblock');
      const sponsorblock = sponsorblock_el ? (sponsorblock_el.value || null) : null;

      return {
        format, quality, playlist,
        embed_subs, embed_thumbnail, embed_metadata, split_chapters, write_info_json, remux,
        subtitles_langs, sponsorblock
      };
    }

    async function savePreset() {
      const name = prompt("Enter a name for this preset:");
      if (!name) return;
      
      const options = getOptions();
      try {
        await api('/presets', {
          method: 'POST',
          body: JSON.stringify({ name, options })
        });
        toast('Preset saved!', 'success');
        await loadPresets();
        const newP = _presets.find(x => x.name === name);
        if (newP) {
          document.getElementById('preset-select').value = newP.id;
        }
      } catch(e) {
        toast('Failed to save preset: ' + e.message, 'error');
      }
    }

    async function submitDownload() {
      const url = document.getElementById('url-input').value.trim();
      const errEl = document.getElementById('url-error');
      const btn = document.getElementById('download-btn');
      
      errEl.classList.add('hidden');
      if (!url) { errEl.textContent = 'Enter a URL first.'; errEl.classList.remove('hidden'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="inline-block w-4 h-4 border-2 border-border border-t-accent rounded-full animate-spin align-middle"></span> Queuing';
      try {
        const body = { url, ...getOptions() };
        await api('/download', {
          method: 'POST',
          body: JSON.stringify(body),
        });
        toast('Added to queue!', 'success');
        document.getElementById('url-input').value = '';
        updateNavBadge();
      } catch (e) {
        errEl.textContent = e.message || 'Unknown error';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Download';
      }
    }

    async function fetchInfo() {
      const url = document.getElementById('url-input').value.trim();
      const errEl = document.getElementById('url-error');
      const infoCard = document.getElementById('info-card');
      const btn = document.getElementById('preview-btn');

      errEl.classList.add('hidden');
      infoCard.classList.add('hidden');
      infoCard.classList.remove('flex');

      if (!url) { errEl.textContent = 'Enter a URL first.'; errEl.classList.remove('hidden'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="inline-block w-4 h-4 border-2 border-border border-t-accent rounded-full animate-spin align-middle"></span>';
      try {
        const info = await api(`/info?url=${encodeURIComponent(url)}`);
        document.getElementById('info-title').textContent = info.title || 'Unknown title';
        document.getElementById('info-uploader').textContent = info.uploader || '';
        document.getElementById('info-duration').textContent = info.duration ? fmtDuration(info.duration) : '';
        const thumb = document.getElementById('info-thumb');
        if (info.thumbnail) { thumb.src = info.thumbnail; thumb.style.display = ''; }
        else thumb.style.display = 'none';
        infoCard.classList.remove('hidden');
        infoCard.classList.add('flex');
      } catch (e) {
        errEl.textContent = e.message || 'Failed to fetch info';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Preview';
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
