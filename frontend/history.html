<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-Z — History</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

  <nav class="nav">
    <a href="/index.html" class="nav-logo">yt-Z</a>
    <div class="nav-links">
      <a href="/index.html">Download</a>
      <a href="/queue.html">Queue <span id="queue-badge" class="badge hidden">0</span></a>
      <a href="/history.html">History</a>
      <a href="/library.html">Library</a>
      <a href="/settings.html">Settings</a>
    </div>
    <div class="nav-spacer"></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </nav>

  <main class="page">
    <h2 class="section-title">Download History</h2>
    <div class="card">
      <div id="history-body">
        <div class="empty-state"><h3>Loading…</h3></div>
      </div>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Log</h3>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <pre id="modal-content" style="background:var(--surface-2); padding:1rem; border-radius:4px; max-height:400px; overflow-y:auto; font-size:0.85rem;"></pre>
      </div>
      <div class="modal-footer" style="margin-top: 1rem; text-align: right;">
        <button class="btn btn-secondary" onclick="copyModalContent()">Copy</button>
      </div>
    </div>
  </div>


  <script src="./assets/app.js"></script>
  <script>
    let currentPage = 1;
    const PER_PAGE = 20;

    document.addEventListener('DOMContentLoaded', () => {
      setupNav();
      loadHistory(1);
    });

    async function loadHistory(page) {
      currentPage = page;
      const body = document.getElementById('history-body');
      body.innerHTML = '<div class="empty-state"><h3>Loading…</h3></div>';
      try {
        const rows = await api(`/downloads?page=${page}&per_page=${PER_PAGE}`);
        renderHistory(rows);
      } catch (e) {
        body.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${escHtml(e.message)}</p></div>`;
      }
    }

    function renderHistory(rows) {
      const body = document.getElementById('history-body');
      const pagination = document.getElementById('pagination');

      if (!rows.length && currentPage === 1) {
        body.innerHTML = `
          <div class="empty-state">
            <h3>No downloads yet</h3>
            <p>Completed downloads appear here.</p>
          </div>`;
        pagination.innerHTML = '';
        return;
      }

      if (!rows.length) {
        loadHistory(currentPage - 1);
        return;
      }

      body.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Title / URL</th>
                <th>Format</th>
                <th>Quality</th>
                <th>Status</th>
                <th>Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => {
                const fname = r.filepath
                  ? r.filepath.split(/[\\/]/).pop()
                  : (r.title || 'download') + '.' + r.format;
                
                const saveBtn = r.status === 'done'
                  ? `<button class="btn btn-secondary btn-sm" onclick="downloadFile('${escHtml(r.id)}','${escHtml(fname)}',this)">⬇ Save</button>`
                  : '';
                const logBtn = `<button class="btn btn-ghost btn-sm" onclick="viewLog('${r.id}')">Log</button>`;
                const infoBtn = `<button class="btn btn-ghost btn-sm" onclick="viewInfo('${r.id}')">JSON</button>`;
                
                return `
                <tr>
                  <td>
                    <div class="td-title">${r.title ? escHtml(r.title) : '—'}</div>
                    <div class="td-url">${escHtml(r.url)}</div>
                  </td>
                  <td>${r.format}</td>
                  <td>${r.quality}</td>
                  <td>
                    <span class="status status-${r.status}">${r.status}</span>
                    <div style="margin-top:0.25rem; font-size:0.8rem; color:var(--danger)">${r.error_msg ? escHtml(r.error_msg) : ''}</div>
                  </td>
                  <td style="white-space:nowrap;color:var(--muted);font-size:.82rem">${fmtDate(r.finished_at || r.created_at)}</td>
                  <td style="display:flex; gap:0.25rem;">${saveBtn}${logBtn}${infoBtn}</td>
                </tr>`;

              }).join('')}
            </tbody>
          </table>
        </div>`;

      // Simple prev / next pagination
      pagination.innerHTML = `
        ${currentPage > 1
          ? `<button class="btn btn-secondary btn-sm" onclick="loadHistory(${currentPage - 1})">← Prev</button>`
          : ''}
        <span>Page ${currentPage}</span>
        ${rows.length === PER_PAGE
          ? `<button class="btn btn-secondary btn-sm" onclick="loadHistory(${currentPage + 1})">Next →</button>`
          : ''}`;
    }

    
    function openModal(title, content) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-content').textContent = content;
      document.getElementById('modal-overlay').classList.remove('hidden');
    }
    
    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }
    
    async function copyModalContent() {
      const content = document.getElementById('modal-content').textContent;
      try {
        await navigator.clipboard.writeText(content);
        toast('Copied!', 'success');
      } catch (e) {
        toast('Failed to copy', 'error');
      }
    }

    async function viewLog(id) {
      try {
        const res = await fetch(`/api/queue/${id}/log`, { headers: authHeaders() });
        if (!res.ok) throw new Error('Log not available');
        const text = await res.text();
        openModal('Job Log', text);
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function viewInfo(id) {
      try {
        const res = await fetch(`/api/queue/${id}/info`, { headers: authHeaders() });
        if (!res.ok) throw new Error('Info JSON not available');
        const data = await res.json();
        openModal('Info JSON', JSON.stringify(data, null, 2));
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
