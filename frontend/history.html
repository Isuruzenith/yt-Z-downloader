<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streamline — History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f0f0f',
            surface: '#1a1a1a',
            'surface-2': '#222222',
            border: '#2a2a2a',
            accent: '#ff4444',
            'accent-hover': '#ff6666',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-[#e0e0e0] font-sans">

  <nav class="sticky top-0 z-50 h-14 bg-surface border-b border-border flex items-center px-6 gap-4">
    <a href="/index.html" class="text-xl font-bold text-accent tracking-tight shrink-0">Streamline</a>
    <div class="flex items-center gap-1">
      <a href="/index.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Download</a>
      <a href="/queue.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Queue <span id="queue-badge" class="hidden inline-flex items-center justify-center min-w-[18px] h-[18px] px-1.5 rounded-full bg-accent text-white text-[10px] font-bold">0</span></a>
      <a href="/history.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">History</a>
      <a href="/library.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Library</a>
      <a href="/settings.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Settings</a>
    </div>
    <div class="flex-1"></div>
    <button class="bg-transparent text-[#888] hover:text-[#e0e0e0] border-0 px-3 py-1.5 text-sm cursor-pointer transition" onclick="logout()">Logout</button>
  </nav>

  <main class="max-w-[860px] mx-auto p-6">
    <h2 class="text-lg font-semibold mb-4">Download History</h2>
    <div class="bg-surface border border-border rounded-lg">
      <div id="history-body">
        <div class="text-center py-12"><h3 class="text-base font-medium">Loading…</h3></div>
      </div>
    </div>
    <div class="flex items-center justify-center gap-3 mt-6" id="pagination"></div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-6" onclick="closeModal()">
    <div class="bg-surface border border-border rounded-lg w-full max-w-lg max-h-[80vh] flex flex-col" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between p-4 border-b border-border">
        <h3 id="modal-title" class="text-base font-medium">Log</h3>
        <button class="text-[#888] hover:text-[#e0e0e0] bg-transparent border-0 px-2 py-1 text-sm cursor-pointer transition" onclick="closeModal()">✕</button>
      </div>
      <div class="p-4 flex-1 overflow-y-auto">
        <pre id="modal-content" class="bg-surface-2 p-4 rounded-lg text-xs text-[#888] max-h-[300px] overflow-y-auto"></pre>
      </div>
      <div class="p-4 border-t border-border text-right">
        <button class="bg-surface-2 text-[#e0e0e0] border border-border hover:border-[#888] px-4 py-2 rounded-lg text-sm cursor-pointer transition" onclick="copyModalContent()">Copy</button>
      </div>
    </div>
  </div>


  <script src="./assets/app.js"></script>
  <script>
    let currentPage = 1;
    const PER_PAGE = 20;

    document.addEventListener('DOMContentLoaded', () => {
      setupNav();
      loadHistory(1);
    });

    async function loadHistory(page) {
      currentPage = page;
      const body = document.getElementById('history-body');
      body.innerHTML = '<div class="text-center py-12"><h3 class="text-base font-medium">Loading…</h3></div>';
      try {
        const rows = await api(`/downloads?page=${page}&per_page=${PER_PAGE}`);
        renderHistory(rows);
      } catch (e) {
        body.innerHTML = `<div class="text-center py-12"><h3 class="text-base font-medium">Error</h3><p class="text-[#888]">${escHtml(e.message)}</p></div>`;
      }
    }

    function renderHistory(rows) {
      const body = document.getElementById('history-body');
      const pagination = document.getElementById('pagination');

      if (!rows.length && currentPage === 1) {
        body.innerHTML = `
          <div class="text-center py-12">
            <h3 class="text-base font-medium mb-1">No downloads yet</h3>
            <p class="text-[#888]">Completed downloads appear here.</p>
          </div>`;
        pagination.innerHTML = '';
        return;
      }

      if (!rows.length) {
        loadHistory(currentPage - 1);
        return;
      }

      const statusColors = {
        queued: 'bg-[#1e293b] text-[#3b82f6]',
        running: 'bg-[#1c1a0e] text-[#f59e0b]',
        done: 'bg-[#0d2318] text-[#22c55e]',
        error: 'bg-[#2a0d0d] text-[#ef4444]',
        cancelled: 'bg-surface-2 text-[#888]',
      };

      body.innerHTML = `
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr>
                <th class="text-left px-3 py-2.5 text-[#888] font-medium border-b border-border whitespace-nowrap">Title / URL</th>
                <th class="text-left px-3 py-2.5 text-[#888] font-medium border-b border-border whitespace-nowrap">Format</th>
                <th class="text-left px-3 py-2.5 text-[#888] font-medium border-b border-border whitespace-nowrap">Quality</th>
                <th class="text-left px-3 py-2.5 text-[#888] font-medium border-b border-border whitespace-nowrap">Status</th>
                <th class="text-left px-3 py-2.5 text-[#888] font-medium border-b border-border whitespace-nowrap">Date</th>
                <th class="text-left px-3 py-2.5 text-[#888] font-medium border-b border-border whitespace-nowrap"></th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => {
                const fname = r.filepath
                  ? r.filepath.split(/[\\/]/).pop()
                  : (r.title || 'download') + '.' + r.format;
                
                const saveBtn = r.status === 'done'
                  ? `<button class="bg-surface-2 text-[#e0e0e0] border border-border hover:border-[#888] px-2 py-1 rounded-lg text-xs transition cursor-pointer" onclick="downloadFile('${escHtml(r.id)}','${escHtml(fname)}',this)">Save</button>`
                  : '';
                const logBtn = `<button class="text-[#888] hover:text-[#e0e0e0] bg-transparent border-0 px-2 py-1 text-xs cursor-pointer transition" onclick="viewLog('${r.id}')">Log</button>`;
                const infoBtn = `<button class="text-[#888] hover:text-[#e0e0e0] bg-transparent border-0 px-2 py-1 text-xs cursor-pointer transition" onclick="viewInfo('${r.id}')">JSON</button>`;
                
                const sc = statusColors[r.status] || statusColors.queued;

                return `
                <tr class="border-b border-border last:border-b-0 hover:bg-surface-2 transition">
                  <td class="px-3 py-2.5 align-middle">
                    <div class="max-w-[260px] overflow-hidden text-ellipsis whitespace-nowrap text-sm font-medium">${r.title ? escHtml(r.title) : '—'}</div>
                    <div class="max-w-[200px] overflow-hidden text-ellipsis whitespace-nowrap text-[#888] text-xs">${escHtml(r.url)}</div>
                  </td>
                  <td class="px-3 py-2.5 align-middle">${r.format}</td>
                  <td class="px-3 py-2.5 align-middle">${r.quality}</td>
                  <td class="px-3 py-2.5 align-middle">
                    <span class="inline-block px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wide ${sc}">${r.status}</span>
                    <div class="mt-0.5 text-xs text-[#ef4444]">${r.error_msg ? escHtml(r.error_msg) : ''}</div>
                  </td>
                  <td class="px-3 py-2.5 align-middle whitespace-nowrap text-[#888] text-xs">${fmtDate(r.finished_at || r.created_at)}</td>
                  <td class="px-3 py-2.5 align-middle"><div class="flex gap-1">${saveBtn}${logBtn}${infoBtn}</div></td>
                </tr>`;

              }).join('')}
            </tbody>
          </table>
        </div>`;

      pagination.innerHTML = `
        ${currentPage > 1
          ? `<button class="bg-surface-2 text-[#e0e0e0] border border-border hover:border-[#888] px-3 py-1.5 rounded-lg text-sm cursor-pointer transition" onclick="loadHistory(${currentPage - 1})">← Prev</button>`
          : ''}
        <span class="text-[#888] text-sm">Page ${currentPage}</span>
        ${rows.length === PER_PAGE
          ? `<button class="bg-surface-2 text-[#e0e0e0] border border-border hover:border-[#888] px-3 py-1.5 rounded-lg text-sm cursor-pointer transition" onclick="loadHistory(${currentPage + 1})">Next →</button>`
          : ''}`;
    }

    
    function openModal(title, content) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-content').textContent = content;
      document.getElementById('modal-overlay').classList.remove('hidden');
    }
    
    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }
    
    async function copyModalContent() {
      const content = document.getElementById('modal-content').textContent;
      try {
        await navigator.clipboard.writeText(content);
        toast('Copied!', 'success');
      } catch (e) {
        toast('Failed to copy', 'error');
      }
    }

    async function viewLog(id) {
      try {
        const res = await fetch(`/api/queue/${id}/log`, { headers: authHeaders() });
        if (!res.ok) throw new Error('Log not available');
        const text = await res.text();
        openModal('Job Log', text);
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function viewInfo(id) {
      try {
        const res = await fetch(`/api/queue/${id}/info`, { headers: authHeaders() });
        if (!res.ok) throw new Error('Info JSON not available');
        const data = await res.json();
        openModal('Info JSON', JSON.stringify(data, null, 2));
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
