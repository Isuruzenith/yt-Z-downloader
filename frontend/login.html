<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streamline — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f0f0f',
            surface: '#1a1a1a',
            'surface-2': '#222222',
            border: '#2a2a2a',
            accent: '#ff4444',
            'accent-hover': '#ff6666',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-[#e0e0e0] font-sans min-h-screen">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-surface border border-border rounded-lg p-6">
      <h1 class="text-3xl font-bold text-accent text-center tracking-tight">Streamline</h1>
      <p class="text-center text-[#888] text-sm mt-1 mb-6">Self-hosted downloader</p>

      <div class="flex bg-surface-2 rounded-lg p-1 mb-6">
        <button class="tab-btn flex-1 py-2 text-sm rounded-md transition bg-surface text-[#e0e0e0] font-medium" data-tab="login">Sign In</button>
        <button class="tab-btn flex-1 py-2 text-sm rounded-md transition text-[#888]" data-tab="register">Register</button>
      </div>

      <form id="login-form">
        <div class="mb-4">
          <label for="login-email" class="block text-sm text-[#888] font-medium mb-1">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required
            class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition placeholder:text-[#888]">
        </div>
        <div class="mb-4">
          <label for="login-password" class="block text-sm text-[#888] font-medium mb-1">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required
            class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition placeholder:text-[#888]">
        </div>
        <p id="login-error" class="text-[#ef4444] text-sm mb-3 hidden"></p>
        <button type="submit" class="w-full bg-accent hover:bg-accent-hover text-white font-medium py-2.5 rounded-lg transition">Sign In</button>
      </form>

      <form id="register-form" class="hidden">
        <div class="mb-4">
          <label for="reg-email" class="block text-sm text-[#888] font-medium mb-1">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required
            class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition placeholder:text-[#888]">
        </div>
        <div class="mb-4">
          <label for="reg-password" class="block text-sm text-[#888] font-medium mb-1">Password</label>
          <input type="password" id="reg-password" placeholder="Min 8 characters" autocomplete="new-password" required minlength="8"
            class="w-full bg-surface-2 border border-border rounded-lg text-[#e0e0e0] px-3 py-2.5 text-sm focus:outline-none focus:border-accent transition placeholder:text-[#888]">
        </div>
        <p id="reg-error" class="text-[#ef4444] text-sm mb-3 hidden"></p>
        <button type="submit" class="w-full bg-accent hover:bg-accent-hover text-white font-medium py-2.5 rounded-lg transition">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'yt_z_token';
    if (localStorage.getItem(TOKEN_KEY)) location.href = '/index.html';

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('bg-surface', 'text-[#e0e0e0]', 'font-medium');
          b.classList.add('text-[#888]');
        });
        btn.classList.add('bg-surface', 'text-[#e0e0e0]', 'font-medium');
        btn.classList.remove('text-[#888]');
        const tab = btn.dataset.tab;
        document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
        document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      });
    });

    async function submitAuth(path, email, password, errId, submitBtn) {
      const errEl = document.getElementById(errId);
      errEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="inline-block w-4 h-4 border-2 border-border border-t-accent rounded-full animate-spin align-middle"></span>';
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Request failed');
        localStorage.setItem(TOKEN_KEY, data.access_token);
        location.href = '/index.html';
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = path.includes('login') ? 'Sign In' : 'Create Account';
      }
    }

    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      const btn = e.currentTarget.querySelector('button[type=submit]');
      submitAuth('/auth/login',
        document.getElementById('login-email').value,
        document.getElementById('login-password').value,
        'login-error', btn);
    });

    document.getElementById('register-form').addEventListener('submit', e => {
      e.preventDefault();
      const btn = e.currentTarget.querySelector('button[type=submit]');
      submitAuth('/auth/register',
        document.getElementById('reg-email').value,
        document.getElementById('reg-password').value,
        'reg-error', btn);
    });
  </script>
</body>
</html>
