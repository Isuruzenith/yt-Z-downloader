<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-Z — Sign In</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="card auth-card">
      <h1 class="logo">yt-Z</h1>
      <p class="logo-sub">Self-hosted downloader</p>

      <div class="tab-bar">
        <button class="tab active" data-tab="login">Sign In</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <!-- Login form -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <p id="login-error" class="error-msg hidden"></p>
        <button type="submit" class="btn btn-primary w-full mt-1">Sign In</button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="hidden">
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Min 8 characters" autocomplete="new-password" required minlength="8">
        </div>
        <p id="reg-error" class="error-msg hidden"></p>
        <button type="submit" class="btn btn-primary w-full mt-1">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'yt_z_token';
    if (localStorage.getItem(TOKEN_KEY)) location.href = '/index.html';

    // Tab switching
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
        document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      });
    });

    async function submitAuth(path, email, password, errId, submitBtn) {
      const errEl = document.getElementById(errId);
      errEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Request failed');
        localStorage.setItem(TOKEN_KEY, data.access_token);
        location.href = '/index.html';
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = path.includes('login') ? 'Sign In' : 'Create Account';
      }
    }

    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      const btn = e.currentTarget.querySelector('button[type=submit]');
      submitAuth('/auth/login',
        document.getElementById('login-email').value,
        document.getElementById('login-password').value,
        'login-error', btn);
    });

    document.getElementById('register-form').addEventListener('submit', e => {
      e.preventDefault();
      const btn = e.currentTarget.querySelector('button[type=submit]');
      submitAuth('/auth/register',
        document.getElementById('reg-email').value,
        document.getElementById('reg-password').value,
        'reg-error', btn);
    });
  </script>
</body>
</html>
