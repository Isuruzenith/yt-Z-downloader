<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streamline — Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f0f0f',
            surface: '#1a1a1a',
            'surface-2': '#222222',
            border: '#2a2a2a',
            accent: '#ff4444',
            'accent-hover': '#ff6666',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-[#e0e0e0] font-sans">

  <nav class="sticky top-0 z-50 h-14 bg-surface border-b border-border flex items-center px-6 gap-4">
    <a href="/index.html" class="text-xl font-bold text-accent tracking-tight shrink-0">Streamline</a>
    <div class="flex items-center gap-1">
      <a href="/index.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Download</a>
      <a href="/queue.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Queue <span id="queue-badge" class="hidden inline-flex items-center justify-center min-w-[18px] h-[18px] px-1.5 rounded-full bg-accent text-white text-[10px] font-bold">0</span></a>
      <a href="/history.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">History</a>
      <a href="/library.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Library</a>
      <a href="/settings.html" class="nav-link inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm text-[#888] hover:text-[#e0e0e0] hover:bg-surface-2 transition">Settings</a>
    </div>
    <div class="flex-1"></div>
    <button class="bg-transparent text-[#888] hover:text-[#e0e0e0] border-0 px-3 py-1.5 text-sm cursor-pointer transition" onclick="logout()">Logout</button>
  </nav>

  <main class="max-w-[860px] mx-auto p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold">Active Queue</h2>
      <button class="bg-surface-2 text-[#e0e0e0] border border-border hover:border-[#888] px-3 py-1.5 rounded-lg text-sm cursor-pointer transition" onclick="renderQueue()">Refresh</button>
    </div>
    <div id="job-list"></div>
  </main>

  <script src="./assets/app.js"></script>
  <script>
    let _jobs = [];
    let _ws = null;

    document.addEventListener('DOMContentLoaded', () => {
      setupNav();
      initQueue();
    });

    async function initQueue() {
      try {
        _jobs = await api('/queue');
        renderQueue();
        connectWebSocket();
      } catch (e) {
        document.getElementById('job-list').innerHTML = `<div class="text-center py-12"><h3 class="text-base font-medium mb-1">Error loading queue</h3><p class="text-[#888]">${escHtml(e.message)}</p></div>`;
      }
    }

    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/api/ws/progress?token=${getToken()}`;
      
      _ws = new WebSocket(wsUrl);
      
      _ws.onmessage = (event) => {
        try {
          const updatedJob = JSON.parse(event.data);
          const index = _jobs.findIndex(j => j.id === updatedJob.id);
          if (index !== -1) {
            _jobs[index] = { ..._jobs[index], ...updatedJob };
          } else {
            _jobs.push(updatedJob);
          }
          renderQueue();
        } catch (e) {
          console.error("WebSocket message error", e);
        }
      };

      _ws.onclose = () => {
        console.log("WebSocket disconnected. Reconnecting in 3s...");
        setTimeout(connectWebSocket, 3000);
      };
    }

    function renderQueue() {
      const list = document.getElementById('job-list');
      updateNavBadge();

      if (!_jobs.length) {
        list.innerHTML = `
          <div class="text-center py-12">
            <h3 class="text-base font-medium mb-1">Queue is empty</h3>
            <p class="text-[#888]">Go to <a href="/index.html" class="text-accent hover:text-accent-hover">Download</a> to add a video.</p>
          </div>`;
        return;
      }

      list.innerHTML = _jobs.map(j => jobCard(j)).join('');
    }

    function jobCard(j) {
      const pct = Math.round(j.progress || 0);
      const fillClass = j.status === 'done' ? 'bg-[#22c55e]' : j.status === 'error' ? 'bg-[#ef4444]' : 'bg-accent';
      const title = j.title || '';
      const displayUrl = j.url.length > 60 ? j.url.slice(0, 60) + '…' : j.url;

      const cancelBtn = j.status === 'queued'
        ? `<button class="text-[#ef4444] border border-[#ef4444] hover:bg-[#ef4444] hover:text-white px-3 py-1.5 rounded-lg text-sm transition cursor-pointer" onclick="cancelJob('${j.id}')">Cancel</button>`
        : '';

      const filename = j.filepath
        ? j.filepath.split(/[\/]/).pop()
        : (j.title || 'download') + '.' + j.format;
      const saveBtn = j.status === 'done'
        ? `<button class="bg-accent hover:bg-accent-hover text-white px-3 py-1.5 rounded-lg text-sm font-medium transition cursor-pointer" onclick="downloadFile('${escHtml(j.id)}','${escHtml(filename)}',this)">Save to PC</button>`
        : '';

      const errorLine = j.error_msg
        ? `<p class="text-[#ef4444] text-xs mt-2">${escHtml(j.error_msg)}</p>`
        : '';

      const statusColors = {
        queued: 'bg-[#1e293b] text-[#3b82f6]',
        running: 'bg-[#1c1a0e] text-[#f59e0b]',
        done: 'bg-[#0d2318] text-[#22c55e]',
        error: 'bg-[#2a0d0d] text-[#ef4444]',
        cancelled: 'bg-surface-2 text-[#888]',
      };
      const statusClass = statusColors[j.status] || statusColors.queued;

      return `
        <div class="bg-surface border border-border rounded-lg p-4 mb-3" id="job-${j.id}">
          <div class="flex items-start justify-between gap-4 mb-2">
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium truncate">${title ? escHtml(title) : ''}</div>
              <span class="text-[#888] text-xs block truncate">${escHtml(displayUrl)}</span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <span class="inline-block px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wide ${statusClass}">${j.status}</span>
              <span class="text-[#888] text-xs">${j.format} / ${j.quality}</span>
              ${cancelBtn}
            </div>
          </div>
          ${j.status === 'running' || j.status === 'done' || j.status === 'error' ? `
            <div class="bg-border rounded-full h-1.5 overflow-hidden my-2">
              <div class="${fillClass} h-full transition-all duration-500 rounded-full" style="width:${pct}%"></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-xs text-[#888]">${pct}%</span>
              ${saveBtn}
            </div>` : ''}
          ${errorLine}
        </div>`;
    }

    async function cancelJob(jobId) {
      try {
        await api(`/queue/${jobId}`, { method: 'DELETE' });
        toast('Job cancelled', 'info');
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
