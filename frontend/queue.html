<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-Z — Queue</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

  <nav class="nav">
    <a href="/index.html" class="nav-logo">yt-Z</a>
    <div class="nav-links">
      <a href="/index.html">Download</a>
      <a href="/queue.html">Queue <span id="queue-badge" class="badge hidden">0</span></a>
      <a href="/history.html">History</a>
      <a href="/library.html">Library</a>
      <a href="/settings.html">Settings</a>
    </div>
    <div class="nav-spacer"></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </nav>

  <main class="page">
    <div class="card-header" style="padding:0 0 1rem">
      <h2 class="section-title" style="margin:0">Active Queue</h2>
      <button class="btn btn-secondary btn-sm" onclick="renderQueue()">Refresh</button>
    </div>
    <div id="job-list"></div>
  </main>

  <script src="./assets/app.js"></script>
  <script>
    let _jobs = [];
    let _ws = null;

    document.addEventListener('DOMContentLoaded', () => {
      setupNav();
      initQueue();
    });

    async function initQueue() {
      try {
        _jobs = await api('/queue');
        renderQueue();
        connectWebSocket();
      } catch (e) {
        document.getElementById('job-list').innerHTML = `<div class="empty-state"><h3>Error loading queue</h3><p>${escHtml(e.message)}</p></div>`;
      }
    }

    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/api/ws/progress?token=${getToken()}`;
      
      _ws = new WebSocket(wsUrl);
      
      _ws.onmessage = (event) => {
        try {
          const updatedJob = JSON.parse(event.data);
          const index = _jobs.findIndex(j => j.id === updatedJob.id);
          if (index !== -1) {
            _jobs[index] = { ..._jobs[index], ...updatedJob };
          } else {
            _jobs.push(updatedJob);
          }
          renderQueue();
        } catch (e) {
          console.error("WebSocket message error", e);
        }
      };

      _ws.onclose = () => {
        console.log("WebSocket disconnected. Reconnecting in 3s...");
        setTimeout(connectWebSocket, 3000);
      };
    }

    function renderQueue() {
      const list = document.getElementById('job-list');
      updateNavBadge();

      if (!_jobs.length) {
        list.innerHTML = `
          <div class="empty-state">
            <h3>Queue is empty</h3>
            <p>Go to <a href="/index.html">Download</a> to add a video.</p>
          </div>`;
        return;
      }

      list.innerHTML = _jobs.map(j => jobCard(j)).join('');
    }

    function jobCard(j) {
      const pct = Math.round(j.progress || 0);
      const fillClass = j.status === 'done' ? 'done' : j.status === 'error' ? 'error' : '';
      const title = j.title || '';
      const displayUrl = j.url.length > 60 ? j.url.slice(0, 60) + '…' : j.url;

      const cancelBtn = j.status === 'queued'
        ? `<button class="btn btn-danger btn-sm" onclick="cancelJob('${j.id}')">Cancel</button>`
        : '';

      const filename = j.filepath
        ? j.filepath.split(/[\/]/).pop()
        : (j.title || 'download') + '.' + j.format;
      const saveBtn = j.status === 'done'
        ? `<button class="btn btn-primary btn-sm" onclick="downloadFile('${escHtml(j.id)}','${escHtml(filename)}',this)">⬇ Save to PC</button>`
        : '';

      const errorLine = j.error_msg
        ? `<p class="error-msg mt-1" style="font-size:.8rem">${escHtml(j.error_msg)}</p>`
        : '';

      return `
        <div class="job-card" id="job-${j.id}">
          <div class="job-header">
            <div class="job-title">
              ${title ? escHtml(title) : ''}
              <span class="url">${escHtml(displayUrl)}</span>
            </div>
            <div class="job-meta">
              <span class="status status-${j.status}">${j.status}</span>
              <span class="text-muted" style="font-size:.8rem">${j.format} / ${j.quality}</span>
              ${cancelBtn}
            </div>
          </div>
          ${j.status === 'running' || j.status === 'done' || j.status === 'error' ? `
            <div class="progress-bar">
              <div class="progress-fill ${fillClass}" style="width:${pct}%"></div>
            </div>
            <div class="job-footer">
              <span class="job-progress-text">${pct}%</span>
              ${saveBtn}
            </div>` : ''}
          ${errorLine}
        </div>`;
    }

    async function cancelJob(jobId) {
      try {
        await api(`/queue/${jobId}`, { method: 'DELETE' });
        toast('Job cancelled', 'info');
        // WebSocket will push the update, but we can optimistically update
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
