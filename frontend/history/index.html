<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History — yt-Z</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="history">

  <nav>
    <a href="/" class="nav-logo">yt-Z</a>
    <ul class="nav-links">
      <li><a href="/queue">queue <span id="queue-badge" style="color:var(--accent);display:none"></span></a></li>
      <li><a href="/history" class="active">history</a></li>
      <li><a href="/settings">settings</a></li>
    </ul>
  </nav>

  <main class="page">
    <p class="breadcrumb"><a href="/">yt-Z</a> / history</p>

    <table class="hist-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Format</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="hist-body">
        <tr>
          <td colspan="3" style="text-align:center;padding:40px 0;color:var(--muted)">Loading…</td>
        </tr>
      </tbody>
    </table>

    <div style="margin-top:28px;text-align:center">
      <button id="load-more" class="btn-ghost" style="display:none">Load more</button>
    </div>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
