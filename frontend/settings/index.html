<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — yt-Z</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="settings">

  <nav>
    <a href="/" class="nav-logo">yt-Z</a>
    <ul class="nav-links">
      <li><a href="/queue">queue <span id="queue-badge" style="color:var(--accent);display:none"></span></a></li>
      <li><a href="/history">history</a></li>
      <li><a href="/settings" class="active">settings</a></li>
    </ul>
  </nav>

  <main class="page">
    <p class="breadcrumb"><a href="/">yt-Z</a> / settings</p>

    <!-- Cookies -->
    <div class="setting-block">
      <span class="setting-label">Cookies</span>
      <hr class="setting-divider">
      <p id="cookie-status" style="font-size:13px;color:var(--muted);margin:0 0 12px 0">Checking…</p>
      <div
        id="upload-zone"
        class="upload-zone"
        role="button"
        tabindex="0"
        aria-label="Upload cookies.json"
      >
        Drop <code style="font-family:monospace;font-size:13px">cookies.json</code> here or click to browse
      </div>
      <input type="file" id="cookie-file" accept=".json" style="display:none">
      <p id="upload-status" style="font-size:13px;margin-top:8px;min-height:18px"></p>
    </div>

    <!-- Storage -->
    <div class="setting-block">
      <span class="setting-label">Storage path</span>
      <hr class="setting-divider">
      <code id="storage-path" style="font-size:13px;color:var(--muted)">—</code>
      <p style="font-size:12px;color:var(--muted);margin:6px 0 0 0">
        Set via <code style="font-size:11px">DOWNLOAD_PATH</code> environment variable.
      </p>
    </div>

    <!-- API key -->
    <div class="setting-block">
      <span class="setting-label">API Key</span>
      <hr class="setting-divider">
      <p style="font-size:13px;color:var(--muted);margin:0 0 10px 0">
        Required if <code style="font-size:11px">API_KEY</code> is set on the server.
        Stored in browser <code style="font-size:11px">localStorage</code>.
      </p>
      <div style="display:flex;gap:10px;align-items:center">
        <input
          type="text"
          id="api-key-input"
          placeholder="Leave empty to disable"
          style="max-width:320px"
          autocomplete="off"
        >
        <button id="save-key-btn" class="btn">Save</button>
      </div>
    </div>

  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
